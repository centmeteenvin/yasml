name: Bug Report
description: Report a bug in yasml
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create a `SynchronousQuery` with ...
        2. Dispatch a `Command` that ...
        3. Observe that ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or stack traces if applicable.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        A link to a repository or a code snippet that reproduces the issue.
        This dramatically speeds up debugging.
      placeholder: https://github.com/...
    validations:
      required: false

  - type: input
    id: yasml-version
    attributes:
      label: yasml version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter version
      description: Output of `flutter --version`.
      placeholder: "3.38.5"
    validations:
      required: true

  - type: input
    id: dart-version
    attributes:
      label: Dart version
      description: Output of `dart --version`.
      placeholder: "3.8.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) does this affect?
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots about the bug.
    validations:
      required: false
