name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature!
        Please describe the problem and the solution you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: |
        What problem does this feature solve? Describe the use case or pain point.
        Ex. "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: |
        Describe the solution you'd like. Include API sketches or code examples
        if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What alternative solutions or workarounds have you considered?
        Why are they insufficient?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, mockups, or references about the feature request.
    validations:
      required: false
