# Composite action: install Flutter SDK and resolve dependencies.
#
# Centralises the two-step setup sequence that every workflow needs.
# Always uses subosito/flutter-action (includes both Flutter and Dart SDKs).
#
# Note: the caller must checkout the repository BEFORE using this action,
# since local composite actions require the repo to be present on the runner.

name: Setup Flutter
description: Install Flutter SDK and run flutter pub get

inputs:
  flutter-version:
    description: Pin a specific Flutter version (e.g. 3.41.2). When set, channel is ignored.
    required: false
    default: ''
  channel:
    description: Flutter release channel (used only when flutter-version is empty)
    required: false
    default: stable

runs:
  using: composite
  steps:
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ inputs.flutter-version }}
        channel: ${{ inputs.flutter-version == '' && inputs.channel || '' }}
        cache: true

    - name: Resolve dependencies
      run: flutter pub get
      shell: bash
      working-directory: yasml
