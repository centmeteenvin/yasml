# Publishes a new version of yasml to pub.dev.
#
# Triggered manually via the Actions UI with a version bump selector.
# Steps: bump version → generate changelog → validate → push → publish → release.
#
# The reusable dart-lang publish workflow requires the tag to exist on the
# remote so it can match the OIDC token against the repository. Therefore we
# push before publishing. If publishing fails the commit and tag are already
# on the remote but can be reverted manually.

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (skip publish and push)'
        required: true
        type: boolean
        default: true

# Never cancel a release mid-flight. If triggered twice,
# the second run queues until the first completes.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write    # push commits/tags, create GitHub Release
  id-token: write    # OIDC token for pub.dev authentication

jobs:
  # ── Prepare: bump, changelog, validate, push ──────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
      old_version: ${{ steps.bump.outputs.old_version }}
    steps:
      # Full history is required for git-cliff to walk tags and generate
      # an accurate changelog across all versions.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: yasml

      # ── Version bump ────────────────────────────────────────────
      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep '^version:' yasml/pubspec.yaml | sed 's/version: *//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" yasml/pubspec.yaml

          echo "old_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          echo "### Version bump" >> "$GITHUB_STEP_SUMMARY"
          echo "- **From:** $CURRENT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **To:** $NEW_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bump type:** ${{ inputs.bump }}" >> "$GITHUB_STEP_SUMMARY"

      # ── Changelog generation ────────────────────────────────────
      # Generate the full CHANGELOG.md (all versions) for the package.
      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.bump.outputs.new_tag }} --output yasml/CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      # Generate release notes (new version only) for the GitHub Release.
      - name: Generate release notes
        id: release_notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.bump.outputs.new_tag }} --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      # ── Commit (local only — not pushed yet) ───────────────────
      # Commit before validation so `dart pub publish --dry-run`
      # sees a clean git working tree and does not warn about
      # modified files (pubspec.yaml, CHANGELOG.md).
      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add yasml/pubspec.yaml yasml/CHANGELOG.md
          git commit -m "chore(yasml): release ${{ steps.bump.outputs.new_version }}"
          git tag "${{ steps.bump.outputs.new_tag }}"

      # ── Validation ──────────────────────────────────────────────
      - name: Validate package (dry-run)
        run: dart pub publish --dry-run
        working-directory: yasml

      # ── Push (must happen before publish for OIDC verification) ─
      - name: Push commit and tag
        if: inputs.dry_run == false
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.new_tag }}"

      # ── Upload release notes for later jobs ─────────────────────
      # Copy to a known filename so the download step can reference it reliably.
      - name: Upload release notes
        if: inputs.dry_run == false
        run: cp "${{ steps.release_notes.outputs.changelog }}" /tmp/release-notes.md

      - name: Upload release notes artifact
        if: inputs.dry_run == false
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/release-notes.md

      # ── Dry-run summary ────────────────────────────────────────
      - name: Dry-run summary
        if: inputs.dry_run == true
        run: |
          echo "## Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No changes were published or pushed." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### What would happen" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.bump.outputs.old_version }} → ${{ steps.bump.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ steps.bump.outputs.new_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish to pub.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "- Push commit and tag to main" >> "$GITHUB_STEP_SUMMARY"
          echo "- Create GitHub Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Generated CHANGELOG.md" >> "$GITHUB_STEP_SUMMARY"
          echo '```markdown' >> "$GITHUB_STEP_SUMMARY"
          cat yasml/CHANGELOG.md >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Release notes" >> "$GITHUB_STEP_SUMMARY"
          echo '```markdown' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.release_notes.outputs.changelog }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── Publish to pub.dev via reusable OIDC workflow ───────────────
  publish:
    name: Publish to pub.dev
    needs: prepare
    if: inputs.dry_run == false
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: yasml
      environment: pub.dev

  # ── GitHub Release (only after successful publish) ──────────────
  github-release:
    name: Create GitHub Release
    needs: [prepare, publish]
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ needs.prepare.outputs.new_tag }}"
          --repo "${{ github.repository }}"
          --title "${{ needs.prepare.outputs.new_tag }}"
          --notes-file release-notes.md
