# git-cliff configuration for yasml
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to the **yasml** package are documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/centmeteenvin/yasml
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
      {{ commit.message | upper_first }} \
      ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
  {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Strip gitmoji shortcodes (e.g. ":memo:", ":sparkles:") from commit messages.
commit_preprocessors = [
  { pattern = ":\\w+: ", replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(yasml\\): release", skip = true },
  { message = "^chore|^ci", group = "Miscellaneous" },
  { message = "^Merge", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"

# Monorepo: only include commits that touch the yasml package.
include_paths = ["yasml/**"]
